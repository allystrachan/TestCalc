:root{--bg:#F8FAF9;--sf:#FFFFFF;--sf2:#F1F5F3;--bd:#D9E2DD;--tx:#1A2B23;--txd:#5C7068;--txm:#8FA39A;--ev:#0D9668;--evd:#087A54;--evl:#10B981;--jun:#0D9668;--spr:#34D399;--red:#DC3545;--amb:#D4920A;--blu:#2E86AB;--pur:#7C5CBF}

.header-inner{display:flex;justify-content:space-between;align-items:flex-start;max-width:1400px;margin:0 auto}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.weave{display:flex;gap:3px}
.weave span{width:4px;height:18px;border-radius:1px}
.weave span:nth-child(odd){background:#34D399}
.weave span:nth-child(even){background:#A7F3D0}
.logo-text{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.7)}
h1{font-family:'Fraunces',Georgia,serif;font-weight:900;font-size:22px;letter-spacing:-.5px}

.header-btns{display:flex;gap:8px}
.hbtn{padding:6px 12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600}
.hbtn:hover{background:rgba(255,255,255,.25)}
.layout{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 90px);max-width:1400px;margin:0 auto}
.layout.single{grid-template-columns:1fr}

.panel-l{padding:20px;border-right:1px solid var(--bd);background:var(--sf);overflow-y:auto;max-height:calc(100vh - 90px)}

.panel-r{padding:20px 24px;overflow-y:auto;max-height:calc(100vh - 90px)}
.step-hd{font-family:'Fraunces',Georgia,serif;font-weight:700;font-size:14px;color:var(--ev);display:flex;align-items:center;gap:8px;margin-bottom:12px}

[data-theme="dark"] .step-num{background:rgba(13,150,104,.25);color:var(--spr)}

.spec-btn{padding:9px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--txd);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:all .15s}
.spec-btn.active{background:rgba(13,150,104,.08);border-color:var(--ev);color:var(--ev)}

.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pm-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.pm-lbl{font-size:9px;color:var(--txd);margin-bottom:2px;font-weight:700}

function sD7(st){let cn;if(!st.con.r)cn=100;else if(st.con.d==="moderate")cn=50;else cn=15;let sc=Math.round(cn*.35+cl(((st.rn/NA.rn)+(st.tk/NA.tk))/2*70)*.25+st.cr.s*.20+cl(130-st.cl*.30)*.20);if(st.con.c)sc=Math.min(sc,50);return sc;}

      rSVG+='</svg>';

      const pc=F.mProfit>=0?'var(--ev)':'var(--red)',mc=F.margin>=0?'var(--ev)':'var(--red)';

          else if(i===4)detail='<p><strong>ASCs:</strong> '+stObj.asc.t+' ('+stObj.asc.p+'/100K)</p><p><strong>Ownership:</strong> Ind '+(stObj.asc.o.i*100).toFixed(0)+'% &middot; Corp '+(stObj.asc.o.c*100).toFixed(0)+'% &middot; Hosp '+(stObj.asc.o.h*100).toFixed(0)+'%</p><p><strong>Hosp Concentration:</strong> '+(stObj.hc*100).toFixed(0)+'%</p>';
          else if(i===5)detail='<p><strong>Age 45-75:</strong> '+(stObj.d.a*100).toFixed(0)+'%</p><p><strong>Obesity:</strong> '+(stObj.d.ob*100).toFixed(1)+'%</p><p><strong>Cancer/100K:</strong> '+stObj.d.ca+'</p><p><strong>MSK:</strong> '+(stObj.d.ms*100).toFixed(0)+'%</p>';

    if(S.tab==='methodology'){
      html+='<div style="font-family:Fraunces,Georgia,serif;font-weight:700;font-size:15px;color:'+(dk?'var(--spr)':'var(--evd)')+';margin-bottom:16px">How These Numbers Were Calculated</div>';

      html+='<div class="card"><div style="font-weight:700;font-size:14px;color:'+(dk?'var(--spr)':'var(--evd)')+';margin-bottom:10px">ASC Payment Formula (Primary Revenue)</div><div style="font-size:13px;line-height:1.7;color:var(--txd)"><p>Oath\'s ASCs are reimbursed per-procedure using CPT codes. This is fundamentally different from hospital inpatient (DRG-based) payment &mdash; the unit of revenue is the procedure performed, not the diagnosis.</p><div class="formula"><span class="hl">ASC Facility Fee = Conversion Factor &times; CPT Relative Weight</span><br><br><span class="dim-text">FY 2025 Conversion Factor = <strong class="hl">$55.27</strong></span><br><span class="dim-text">Example: Total Knee (CPT 27447), weight 67.38</span><br><span class="dim-text">= $55.27 &times; 67.38 = <strong class="hl">$3,724</strong></span></div><p style="margin-top:8px">The ASC facility fee covers the center\'s costs (OR time, nursing, supplies, equipment). Surgeon professional fees and anesthesia are billed separately under their own fee schedules. This is what Oath collects as facility revenue per case.</p></div></div>';

      html+='<div class="card"><div style="font-weight:700;font-size:14px;color:'+(dk?'var(--spr)':'var(--evd)')+';margin-bottom:10px">Oath\'s Profit Per Case</div><div style="font-size:13px;line-height:1.7;color:var(--txd)"><p>Oath\'s margin on each procedure is the difference between what they collect (ASC reimbursement) and what it costs them to deliver the care.</p><div class="formula"><span class="hl">Profit = ASC Reimbursement &minus; Cost to Deliver</span><br><span class="hl">Margin % = Profit &divide; ASC Reimbursement &times; 100</span><br><br><span class="dim-text">Example: Total Knee</span><br><span class="dim-text">Reimbursement: <strong class="hl">$3,724</strong> (CPT 27447)</span><br><span class="dim-text">Typical cost range: $12,000&ndash;$22,000</span><br><span class="dim-text">At midpoint cost ($17,000): Margin = <strong style="color:var(--red)">-$13,276 (-356%)</strong></span><br><br><span class="dim-text" style="font-style:italic">Note: Medicare ASC rates alone often don\'t cover complex procedures. Profitability depends heavily on payor mix &mdash; private/commercial rates at 1.8&times; Medicare shift margins substantially. Bundled and value-based contracts can further improve economics.</span></div></div></div>';

      html+='<div class="card"><div style="font-weight:700;font-size:14px;color:'+(dk?'var(--spr)':'var(--evd)')+';margin-bottom:10px">Payor Mix Blending</div><div style="font-size:13px;line-height:1.7;color:var(--txd)"><div class="formula"><span class="hl">Blended Rate = ASC Pay &times; (MCare% &times; 1.0 + MCaid% &times; '+stObj.med+' + Priv% &times; 1.8 + Self% &times; 0.5)</span><br><br><span class="dim-text">Your mix: Medicare '+S.pm.medicare+'% | Medicaid '+S.pm.medicaid+'% | Private '+S.pm.private+'% | Self '+S.pm.selfpay+'%</span><br><span class="dim-text">Blended per case = <strong class="hl">'+fmt(F.bl)+'</strong></span></div></div></div>';

      html+='<div class="card"><div style="font-weight:700;font-size:14px;color:'+(dk?'var(--spr)':'var(--evd)')+';margin-bottom:10px">Composite Scoring</div><div style="font-size:13px;line-height:1.7;color:var(--txd)"><div class="formula">'+dimN.map((n,i)=>'<span class="dim-text">'+n+': <strong class="hl">'+C.scores[i]+'</strong> &times; '+S.weights[i]+'% = '+(C.scores[i]*S.weights[i]/100).toFixed(1)+'</span><br>').join('')+'<div style="border-top:1px solid var(--bd);margin-top:6px;padding-top:6px"><strong class="hl">Composite = '+C.composite+'</strong></div></div></div></div>';

      html+='<div class="card" style="border-style:dashed;opacity:0.8"><div style="font-weight:700;font-size:14px;color:var(--txm);margin-bottom:10px">Reference: Hospital IPPS Formula (for payor comparisons)</div><div style="font-size:13px;line-height:1.7;color:var(--txm)"><p>Hospitals are paid per-diagnosis via DRGs under the IPPS. This is <em>not</em> how ASCs are paid, but the comparison is useful for demonstrating cost savings to payors and employers.</p><div class="formula" style="opacity:0.85"><span class="dim-text">Hospital Payment = Base Rate &times; Wage Adj &times; DRG Weight</span><br><span class="dim-text">= '+fmt(NBR)+' &times; '+calcWA(wi).toFixed(4)+' &times; DRG Weight</span><br><span class="dim-text">Adj Base for this location = '+fmt(NBR*calcWA(wi))+'</span></div><p>When Oath pitches an employer: "You pay a hospital ~$12K for this procedure (DRG). We perform it for ~$3.7K (ASC CPT). You save ~$8K per case." The hospital figure comes from this formula.</p></div></div>';

      html+='<div class="card"><div style="font-weight:700;font-size:14px;color:'+(dk?'var(--spr)':'var(--evd)')+';margin-bottom:10px">Data Sources</div><div style="font-size:12px;line-height:1.8;color:var(--txd)">'+[["CMS ASC Payment System FY 2025","CPT relative weights, conversion factor ($55.27) \u2014 primary revenue basis"],["CMS IPPS Final Rule FY 2025/2026","DRG weights, base rates, wage indices \u2014 hospital reference only"],["KFF Medicaid-to-Medicare Fee Index","State-level Medicaid reimbursement ratios"],["NCSL & Mercatus Center","Certificate of Need law tracking"],["AANA","CRNA scope of practice and state opt-out status"],["CMS Provider of Services File","ASC counts and ownership by state"],["RAND Price Transparency Study","Commercial-to-Medicare rate multiples"],["Census, BLS, HRSA, CDC","Population, demographics, workforce, health data"]].map(([s,d],i)=>'<p><strong>['+(i+1)+']</strong> '+s+' &mdash; '+d+'</p>').join('')+'</div></div>';
    }

    html+='<div class="footer">Oath Surgical &middot; ASC Market Evaluator v1.0<br>For internal planning use only. Verify against actual payer contracts.</div></div>';
  }
  html+='</div>';
  document.getElementById('app').innerHTML=html;
}

function buildProcTable(procs,wi,showHospRef){
  const hasRef=showHospRef||false;
  let h='<table class="proc-table"><thead><tr><th>Procedure</th><th>ASC Reimbursement</th><th>Est. Cost Range</th><th>Est. Margin</th>'+(hasRef?'<th style="color:var(--txm)">Hosp Ref (DRG)</th><th style="color:var(--txm)">Payor Savings</th>':'')+'<th>ASC Eligible</th></tr></thead><tbody>';
  procs.forEach(p=>{
    const ap=p.ae?p.a.p:0;
    const avgCost=p.ae?(p.co[0]+p.co[1])/2:0;
    const margin=ap>0?((ap-avgCost)/ap*100):0;
    const mc=margin>=0?'var(--ev)':'var(--red)';
    const hp=calcMP(wi,p.h.s.w);
    const payorSave=hp-ap;
    h+='<tr><td style="font-weight:500">'+p.n+'</td>';
    h+='<td style="font-weight:700;color:var(--ev)">'+(p.ae?fmt(ap):'&mdash;')+'</td>';
    h+='<td>'+(p.ae?fmt(p.co[0])+'&ndash;'+fmt(p.co[1]):'&mdash;')+'</td>';
    h+='<td style="color:'+mc+';font-weight:700">'+(p.ae?fmtP(margin):'&mdash;')+'</td>';
    if(hasRef){
      h+='<td style="color:var(--txm)">'+fmt(hp)+'</td>';
      h+='<td style="color:var(--txm)">'+(p.ae?fmt(payorSave):'&mdash;')+'</td>';
    }
    h+='<td><span class="badge '+(p.ae?'yes':'no')+'">'+(p.ae?'Yes':'No')+'</span></td></tr>';
  });
  h+='</tbody></table>';return h;
}

function buildSensTable(rows,title){
  let h='<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--txd);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">'+title+'</div><table class="sens-table"><thead><tr><th style="text-align:left">Scenario</th><th>Volume</th><th>Revenue</th><th>Costs</th><th>Profit</th><th>Margin</th></tr></thead><tbody>';
  rows.forEach(r=>{const pc=r.profit>=0?'var(--ev)':'var(--red)',isBase=r.label.includes('Base')||r.label==='Vol +0%';h+='<tr'+(isBase?' class="base"':'')+'><td>'+r.label+'</td><td>'+r.vol+'</td><td>'+fmtK(r.rev)+'</td><td>'+fmtK(r.cost)+'</td><td style="color:'+pc+';font-weight:700">'+fmtK(r.profit)+'</td><td style="color:'+pc+';font-weight:700">'+fmtP(r.margin)+'</td></tr>';});
  h+='</tbody></table></div>';return h;
}

function setState(v){state.st=v;state.city='';state.computed=null;render();}
function setCity(v){state.city=v;render();}
function toggleSpec(k){const i=state.specs.indexOf(k);if(i>=0)state.specs.splice(i,1);else state.specs.push(k);state.computed=null;render();}
function setFin(k,v){state[k]=parseFloat(v)||0;render();}
function setPM(k,v){state.pm[k]=parseInt(v)||0;render();}
function setTab(t){state.tab=t;render();}
function toggleDim(i){state.expDim=state.expDim===i?null:i;render();}
function setWeight(i,v){state.weights[i]=parseInt(v);render();}
function toggleTheme(){state.theme=state.theme==='light'?'dark':'light';render();}

function compute(){
  const S=state,st=SD[S.st];if(!st||S.specs.length===0)return;
  const wi=S.city&&st.m[S.city]?st.m[S.city].wi:st.wi;
  const scores=[sD1(st,S.specs),sD2(st),sD3(st),sD4(st,S.specs,S.pm,wi),sD5(st),sD6(st),sD7(st)];
  const totalW=S.weights.reduce((a,b)=>a+b,0)||100;
  const composite=Math.round(scores.reduce((sum,sc,i)=>sum+sc*(S.weights[i]/totalW),0));

  const ascP=S.specs.flatMap(sp=>Object.values(PD[sp]||{}).filter(p=>p.ae&&p.a.p>0));
  const avgA=ascP.length>0?ascP.reduce((s,p)=>s+p.a.p,0)/ascP.length:0;
  const bl=avgA*(S.pm.medicare/100+S.pm.medicaid/100*st.med+S.pm.private/100*1.8+S.pm.selfpay/100*0.5);
  const mRev=bl*S.vol,mCost=S.fac+S.staff+(S.sup*S.vol),mProfit=mRev-mCost;
  const margin=mRev>0?(mProfit/mRev)*100:0;
  const be=bl>S.sup?(S.fac+S.staff)/(bl-S.sup):Infinity;

  const dn=["Procedure Demand","Surgeon Supply","Payor Ecosystem","Reimbursement","Competition","Demographics","Operations"];
  const weakest=scores.indexOf(Math.min(...scores)),strongest=scores.indexOf(Math.max(...scores));
  let verdict;
  if(composite>=80)verdict='Strong multi-stakeholder alignment. '+dn[strongest]+' is your standout advantage.';
  else if(composite>=66)verdict='Favorable market. '+dn[weakest]+' is a moderate risk worth monitoring.';
  else if(composite>=50)verdict='Mixed signals. '+dn[weakest]+' and related factors need further investigation.';
  else if(composite>=40)verdict='Below average. Significant headwinds in '+dn[weakest]+'.';
  else verdict='Weak alignment. Consider alternative locations \u2014 '+dn[weakest]+' is a major barrier.';

  const calcRev=(pm,vol)=>{const ap=S.specs.flatMap(s=>Object.values(PD[s]||{}).filter(p=>p.ae&&p.a.p>0));if(!ap.length)return 0;const avg=ap.reduce((s,p)=>s+p.a.p,0)/ap.length;return avg*(pm.medicare/100+pm.medicaid/100*st.med+pm.private/100*1.8+pm.selfpay/100*0.5)*vol;};
  const calcCost=vol=>S.fac+S.staff+S.sup*vol;
  const sens=[];
  [-20,-10,0,10,20].forEach(vp=>{const v=Math.round(S.vol*(1+vp/100)),r=calcRev(S.pm,v),c=calcCost(v);sens.push({label:'Vol '+(vp>=0?'+':'')+vp+'%',vol:v,rev:r,cost:c,profit:r-c,margin:r>0?(r-c)/r*100:0,type:'volume'});});
  [{pm:{...S.pm,medicaid:S.pm.medicaid+10,private:S.pm.private-10},label:'+10pt Medicaid'},{pm:S.pm,label:'Base Mix'},{pm:{...S.pm,private:S.pm.private+10,medicare:S.pm.medicare-10},label:'+10pt Private'}].forEach(({pm,label})=>{const r=calcRev(pm,S.vol),c=calcCost(S.vol);sens.push({label,vol:S.vol,rev:r,cost:c,profit:r-c,margin:r>0?(r-c)/r*100:0,type:'payor'});});

  state.computed={scores,composite,verdict,sensitivity:sens,fin:{mRev,mCost,mProfit,margin,be,bl}};
  state.tab='overview';state.expDim=null;
  render();
  document.querySelector('.panel-r')&&document.querySelector('.panel-r').scrollTo(0,0);
}

render();
</script>
